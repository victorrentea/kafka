#spring.cloud.stream.binders.configuration


spring.cloud.stream.kafka.binder.configuration.commit.interval.ms = 1000
spring.cloud.stream.kafka.binder.configuration.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.cloud.stream.kafka.binder.configuration.default.value.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.cloud.stream.kafka.binder.min-partition-count=1
spring.cloud.stream.kafka.binder.replication-factor=1

spring.cloud.stream.bindings.pvout.destination=pvs
spring.cloud.stream.bindings.pvout.producer.header-mode=none

spring.cloud.stream.bindings.pvin.destination=pvs
spring.cloud.stream.bindings.pvin.consumer.header-mode=none

spring.cloud.stream.bindings.pcout.destination=pcs
spring.cloud.stream.bindings.pcout.producer.use-native-encoding=true
spring.cloud.stream.kafka.streams.bindings.pcout.producer.key-serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.cloud.stream.kafka.streams.bindings.pcout.producer.value-serde=org.apache.kafka.common.serialization.Serdes$StringSerde


spring.cloud.stream.bindings.printer-in-0.destination=pcs
spring.cloud.stream.bindings.printer-in-0.consumer.use-native-decoding=true
spring.cloud.stream.bindings.printer-in-0.group=true
spring.cloud.stream.bindings.printer-in-0.consumer.header-mode=none
spring.cloud.stream.bindings.printer-in-0.content-type=application/json
spring.cloud.stream.kafka.streams.bindings.printer-in-0.consumer.key-serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.cloud.stream.kafka.streams.bindings.printer-in-0.consumer.value-serde=org.apache.kafka.common.serialization.Serdes$StringSerde

